version: '3.8'

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ecommerce_db
    ports:
      - "3306:3306"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ecommerce-net

  service-a:
    build:
      context: ./service-a
      dockerfile: Dockerfile
    ports:
      - "8081:80"
    environment:
      - DB_HOST=db
    depends_on:
      - db
    networks:
      - ecommerce-net

  service-b:
    build:
      context: ./service-b
      dockerfile: Dockerfile
    ports:
      - "8082:80"
    networks:
      - ecommerce-net

  service-c: # Bonus Service
    build:
      context: ./service-c
      dockerfile: Dockerfile
    ports:
      - "8083:80"
    networks:
      - ecommerce-net

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "8000:80"
    environment:
      - SERVICE_A_URL=http://service-a:80/api/products
      - SERVICE_B_URL=http://service-b:80/api/shipping
      - SERVICE_C_URL=http://service-c:80/api/promo
    depends_on:
      - service-a
      - service-b
      - service-c
    networks:
      - ecommerce-net

networks:
  ecommerce-net:
    driver: bridge